<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#f7f7f7">
  <meta name="description" content="不读取内容的数字手感与应用强度观察器">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>扣舷</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --trad-green-300:#9fd5b5;--trad-green-400:#60b67f;--trad-green-500:#2f8f59;--trad-green-600:#1f6f43;
      --rose-200:#ffc6cf;--rose-300:#f79bad;--rose-400:#ef7489;--rose-500:#e75d74;--rose-600:#d74860;
      --ink:#171717;--ink-soft:#3b3b3b;--muted:#777b82;--faint:#aeb2b8;
      --blue:#3f6fd9;--mint:#18a06f;--amber:#d08a19;--violet:#7164d8;
      --r:8px;--r-sm:7px;--heat-cell:13px;--heat-gap:3px;--heat-day-gap:var(--heat-gap);--heat-day-count:6;
      --heat-day-width:calc(var(--heat-cell) * 4 + var(--heat-gap) * 3);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    html{
      --bg:#f7f7f7;--surface:#ffffff;--surface-hover:#fafafa;--surface-raised:#ffffff;
      --border:rgba(23,23,23,.07);--border-hover:rgba(23,23,23,.14);
      --text:var(--ink);--text2:var(--ink-soft);--text3:var(--muted);--text4:var(--faint);
      --primary:var(--trad-green-500);--primary-strong:var(--trad-green-600);--primary-dim:#edf8f0;
      --bar-bg:#eeeeee;--shadow:0 10px 28px rgba(24,24,24,.07);--shadow-sm:0 5px 16px rgba(24,24,24,.055);
      --heat-empty:#f1f1f1;--heat-1:#e5f5e9;--heat-2:#c6e9d0;--heat-3:#9fd5b5;--heat-4:#60b67f;--heat-5:#2f8f59;--heat-6:#1f6f43;
      font-family:'Inter','SF Pro Display','Segoe UI','Microsoft YaHei',system-ui,sans-serif;
      background:var(--bg);color:var(--text);height:100%;-webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    html[data-theme="light"]{
      --bg:#f7f7f7;--surface:#ffffff;--surface-hover:#fafafa;--surface-raised:#ffffff;
      --border:rgba(23,23,23,.07);--border-hover:rgba(23,23,23,.14);
      --text:var(--ink);--text2:var(--ink-soft);--text3:var(--muted);--text4:var(--faint);
      --primary:var(--trad-green-500);--primary-strong:var(--trad-green-600);--primary-dim:#edf8f0;
      --bar-bg:#eeeeee;
      --heat-empty:#f1f1f1;--heat-1:#e5f5e9;--heat-2:#c6e9d0;--heat-3:#9fd5b5;--heat-4:#60b67f;--heat-5:#2f8f59;--heat-6:#1f6f43;
    }
    html[data-theme="dark"]{
      --bg:#151515;--surface:#202020;--surface-hover:#282828;--surface-raised:#252525;
      --border:rgba(255,255,255,.08);--border-hover:rgba(255,255,255,.16);
      --text:#f5f5f5;--text2:#dedede;--text3:#a7a7a7;--text4:#777;
      --primary:#7bd19b;--primary-strong:#a7e3bb;--primary-dim:rgba(123,209,155,.15);
      --bar-bg:rgba(255,255,255,.09);--shadow:0 14px 34px rgba(0,0,0,.32);--shadow-sm:0 7px 18px rgba(0,0,0,.26);
      --heat-empty:#2b2b2b;--heat-1:#173523;--heat-2:#205238;--heat-3:#2e754d;--heat-4:#429d67;--heat-5:#62bf83;--heat-6:#a7e3bb;
    }
    html[data-accent="rose"]{
      --primary:var(--rose-500);--primary-strong:var(--rose-600);--primary-dim:#fff1f3;
      --heat-empty:#f1f1f1;--heat-1:#ffe7eb;--heat-2:#ffc6cf;--heat-3:#f79bad;--heat-4:#ef7489;--heat-5:#e75d74;--heat-6:#bf2f49;
    }
    html[data-theme="dark"][data-accent="rose"]{
      --primary:#ff8ea0;--primary-strong:#ffadba;--primary-dim:rgba(255,142,160,.15);
      --heat-empty:#2b2b2b;--heat-1:#4a222b;--heat-2:#6d303d;--heat-3:#974253;--heat-4:#c5576c;--heat-5:#ef7489;--heat-6:#ffc0cb;
    }
    html[data-accent="indigo"]{
      --primary:#4f68d7;--primary-strong:#344caf;--primary-dim:#eef1ff;
      --heat-empty:#f1f1f1;--heat-1:#e6eaff;--heat-2:#cbd4ff;--heat-3:#9dabf5;--heat-4:#7386e6;--heat-5:#4f68d7;--heat-6:#2d3f98;
    }
    html[data-theme="dark"][data-accent="indigo"]{
      --primary:#92a3ff;--primary-strong:#b7c2ff;--primary-dim:rgba(146,163,255,.15);
      --heat-empty:#2b2b2b;--heat-1:#252b52;--heat-2:#30396e;--heat-3:#46529b;--heat-4:#6274d4;--heat-5:#92a3ff;--heat-6:#c9d1ff;
    }
    html[data-accent="ink"]{
      --primary:#2f3437;--primary-strong:#171717;--primary-dim:#eeeeee;
      --heat-empty:#f1f1f1;--heat-1:#e5e5e5;--heat-2:#cfcfcf;--heat-3:#a8a8a8;--heat-4:#777;--heat-5:#444;--heat-6:#171717;
    }
    html[data-theme="dark"][data-accent="ink"]{
      --primary:#e5e5e5;--primary-strong:#fff;--primary-dim:rgba(255,255,255,.12);
      --heat-empty:#2b2b2b;--heat-1:#3a3a3a;--heat-2:#555;--heat-3:#777;--heat-4:#aaa;--heat-5:#d0d0d0;--heat-6:#fff;
    }
    body{
      height:100%;overflow:hidden;display:flex;flex-direction:column;
      padding-top: var(--safe-top);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    
    .wrap{
      width:520px;max-width:100%;height:100%;flex:1;display:grid;
      grid-template-rows:42px 50px 56px minmax(160px,1fr) 430px;
      padding:12px 14px calc(12px + var(--safe-bottom));
      gap:9px;min-height:0;overflow:hidden;margin:0 auto;
    }
    body.nativebar .header{display:none}
    body.nativebar .wrap{padding-top:11px;grid-template-rows:50px 56px minmax(160px,1fr) 430px}

    /* ── Header ─────────────────── */
    .header{display:flex;align-items:center;gap:10px;flex-shrink:0;height:42px}
    .title-area{height:100%;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .title-area.window-drag{cursor:grab}
    .title-area.window-drag:active{cursor:grabbing}
    .logo{width:31px;height:31px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm);overflow:hidden}
    .logo img{width:31px;height:31px;display:block;object-fit:cover}
    .brand-copy{display:flex;flex-direction:column;gap:2px;min-width:0}
    .header h1{font-size:22px;font-weight:850;letter-spacing:0;flex-shrink:0;line-height:1}
    .brand-copy span{font-size:11px;color:var(--text4);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
    .spacer{flex:1}
    .status{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text3)}
    .dot{width:5px;height:5px;border-radius:50%;background:var(--primary);box-shadow:0 0 6px color-mix(in srgb,var(--primary) 38%,transparent);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .theme-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .16s;box-shadow:var(--shadow-sm)}
    .theme-btn:hover{border-color:var(--border-hover);background:var(--surface-hover)}
    .tool-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .16s;box-shadow:var(--shadow-sm)}
    .tool-btn:hover{border-color:var(--border-hover);background:var(--surface-hover);color:var(--text);transform:translateY(-1px)}
    .tool-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .lang-btn{min-width:34px;padding:0 8px;font-size:11px;font-weight:850;letter-spacing:.02em}
    .window-btn{display:none;width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;align-items:center;justify-content:center;transition:all .16s;box-shadow:var(--shadow-sm)}
    body.is-desktop .window-btn{display:flex}
    .window-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .window-btn:hover{border-color:var(--border-hover);background:var(--surface-hover);color:var(--text);transform:translateY(-1px)}
    .window-btn.close:hover{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.12);color:#ef4444}

    /* ── Today summary ───────────── */
    .today-card{
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:8px 14px;box-shadow:var(--shadow);flex-shrink:0;min-height:0;
      display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;
    }
    .today-kicker{font-size:12px;color:var(--text4);font-weight:750;line-height:1}
    .date-board{display:inline-flex;align-items:center;gap:6px}
    .date-nav{width:22px;height:22px;border-radius:7px;border:1px solid var(--border);background:var(--surface-hover);color:var(--text3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;line-height:1;transition:all .12s ease}
    .date-nav:hover:not(:disabled){border-color:var(--border-hover);color:var(--text);background:var(--primary-dim)}
    .date-nav:disabled{opacity:.38;color:var(--text4);background:var(--surface-hover);border-color:var(--border);cursor:not-allowed}
    #today-date{display:inline-flex;align-items:center;justify-content:center;min-width:48px;font-variant-numeric:tabular-nums}
    .today-score{min-width:94px;text-align:right;align-self:center}
    .today-score b{display:block;font-size:27px;font-weight:900;color:var(--primary);font-variant-numeric:tabular-nums;line-height:1}

    /* ── Stats ──────────────────── */
    .stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;flex-shrink:0;height:56px;min-height:0}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:7px;padding:0 10px;overflow:hidden;box-shadow:var(--shadow)}
    .stat-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stat-icon svg{width:15px;height:15px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .stat-icon.g{background:var(--primary-dim);color:var(--primary)}.stat-icon.m{background:rgba(63,111,217,.1);color:var(--blue)}.stat-icon.t{background:rgba(24,160,111,.11);color:var(--mint)}
    .stat-label{font-size:11px;letter-spacing:0;color:var(--text3);font-weight:700;line-height:1.15}
    .stat-val{font-size:20px;font-weight:850;letter-spacing:0;line-height:1.08;font-variant-numeric:tabular-nums}
    .stat-val.green{color:var(--primary)}.stat-val.amber{color:var(--blue)}.stat-val.teal{color:var(--mint)}

    /* ── Heatmap (contribution graph style) ── */
    .heat-card{
      background:var(--surface);border:1px solid var(--border);border-radius:8px;
      padding:10px 14px 9px;display:flex;flex-direction:column;flex-shrink:0;
      min-height:0;box-shadow:var(--shadow);overflow:hidden;
    }
    .heat-head{display:flex;align-items:center;margin-bottom:7px;flex-shrink:0}
    .heat-title{display:flex;align-items:center;gap:9px;min-width:0;width:100%}
    .heat-title .dot-sm{width:6px;height:6px;border-radius:50%;background:var(--primary)}
    .heat-label{display:flex;align-items:center;gap:0;font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;line-height:1}
    .heat-label-static{color:var(--text);margin-left:0}
    .heat-now-text{font-size:12px;color:var(--text4);font-variant-numeric:tabular-nums;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;text-align:right}
    .heat-toggles{display:inline-flex;align-items:baseline;gap:0;font-size:0}
    .heat-toggle{display:inline-flex;align-items:baseline;color:var(--text4);font:inherit;cursor:pointer;user-select:none;line-height:1}
    .heat-toggle input{position:absolute;opacity:0;pointer-events:none}
    .heat-toggle span{padding:0;font-size:15px;font-weight:800;transition:color .12s ease,opacity .12s ease}
    .heat-toggle:hover span{color:var(--text2)}
    .heat-toggle input:checked + span{color:var(--primary)}
    .heat-range{display:flex;gap:3px;border:1px solid var(--border);border-radius:7px;padding:2px;background:var(--surface-hover)}
    .heat-range button{border:0;background:transparent;color:var(--text4);font-size:11px;font-weight:750;border-radius:5px;padding:2px 7px;cursor:pointer;line-height:1}
    .heat-range button.active{background:var(--primary-dim);color:var(--primary)}
    .heat-wrap{flex:1;display:flex;flex-direction:column;align-items:center;min-height:0;justify-content:center;width:100%;overflow:hidden}
    .heat-days{display:grid;grid-template-columns:repeat(var(--heat-day-count),var(--heat-day-width));justify-content:center;width:max-content;margin-bottom:6px;flex-shrink:0;gap:var(--heat-day-gap)}
    .heat-days span{font-size:10px;color:var(--text4);font-weight:650;text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums;width:var(--heat-day-width);line-height:1}
    .heat-body{display:flex;justify-content:center;align-items:center;width:100%;min-height:0}
    .heat-hours{display:none}
    .heat-grid{display:grid;grid-template-columns:repeat(var(--heat-day-count),var(--heat-day-width));gap:var(--heat-day-gap);justify-content:center;width:max-content;min-width:0;min-height:0}
    .heat-weekdays{display:grid;grid-template-columns:repeat(var(--heat-day-count),var(--heat-day-width));justify-content:center;width:max-content;margin-top:6px;flex-shrink:0;gap:var(--heat-day-gap)}
    .heat-weekdays span{font-size:9px;color:var(--text4);font-weight:650;opacity:.76;text-align:center;white-space:nowrap;width:var(--heat-day-width);line-height:1}
    .heat-days:empty,.heat-weekdays:empty{display:none}
    .day-block{display:grid;grid-template-columns:repeat(4,var(--heat-cell));grid-template-rows:repeat(6,var(--heat-cell));grid-auto-flow:column;gap:var(--heat-gap)}
    .heat-grid.month{grid-template-columns:repeat(7,18px);gap:5px;align-items:center}
    .heat-grid.month .month-cell{width:18px;height:18px;border-radius:5px;cursor:pointer;outline:1px solid rgba(255,255,255,.58);outline-offset:-1px}
    html[data-theme="dark"] .heat-grid.month .month-cell{outline-color:rgba(255,255,255,.05)}
    .heat-grid.year{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:7px 8px;width:100%;max-width:430px;align-items:start;padding-top:3px}
    .year-month{min-width:0;display:grid;gap:3px;justify-items:center}
    .year-month-label{font-size:9px;font-weight:750;color:var(--text4);line-height:1}
    .year-month-grid{display:grid;grid-template-columns:repeat(7,5.5px);gap:1.3px;justify-content:center}
    .year-cell{width:5.5px;height:5.5px;border-radius:1.6px;outline:1px solid rgba(255,255,255,.45);outline-offset:-1px}
    html[data-theme="dark"] .year-cell{outline-color:rgba(255,255,255,.04)}
    .hc{position:relative;border-radius:3px;cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;width:var(--heat-cell);height:var(--heat-cell);outline:1px solid rgba(255,255,255,.58);outline-offset:-1px}
    html[data-theme="dark"] .hc{outline-color:rgba(255,255,255,.05)}
    .hc.now{box-shadow:0 0 0 2px color-mix(in srgb,var(--primary) 60%,transparent);z-index:1}
    .hc:hover{transform:scale(1.18);z-index:2;box-shadow:0 0 6px rgba(0,0,0,.18)}
    .heat-foot{display:flex;align-items:center;gap:8px;margin-top:7px;justify-content:space-between;flex-shrink:0}
    .heat-foot .heat-legend{display:flex;align-items:center;gap:5px}
    .heat-foot span{font-size:10px;color:var(--text4)}
    .heat-foot .lg-cells{display:flex;gap:2px}
    .heat-foot .lg-cells i{width:8px;height:10px;border-radius:2px;display:inline-block;outline:1px solid rgba(0,0,0,.035);outline-offset:-1px}

    /* ── App usage ──────────────── */
    .app-section{
      display:flex;flex-direction:column;min-height:0;background:var(--surface);
      border:1px solid var(--border);border-radius:8px;padding:13px 13px 14px;
      overflow:hidden;flex-shrink:0;
      flex:0 0 auto;min-height:0;max-height:none;box-shadow:var(--shadow);
    }
    .sec-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .sec-head .dot-sm{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .sec-head h2{font-size:15px;font-weight:800;color:var(--text)}
    .app-list{flex:1;overflow:hidden;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(5,62px);grid-auto-flow:column;column-gap:12px;row-gap:8px;min-height:0;padding-right:0}
    .app-row{position:relative;display:grid;grid-template-columns:26px 34px minmax(0,1fr);grid-template-rows:21px 18px 8px;align-items:center;gap:1px 8px;padding:7px 8px 6px;border-radius:8px;background:transparent;border:1px solid transparent;transition:background .12s;flex-shrink:0;min-width:0;cursor:pointer;overflow:hidden}
    .app-row:hover{background:var(--primary-dim);border-color:transparent;transform:none}
    .app-row:active{background:var(--primary-dim)}
    .app-rank{grid-row:1/4;width:26px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:850;flex-shrink:0}
    .app-rank.r0{background:var(--primary-dim);color:var(--primary)}
    .app-rank.r1{background:rgba(63,111,217,.1);color:var(--blue)}
    .app-rank.r2{background:rgba(24,160,111,.11);color:var(--mint)}
    .app-rank.r3{background:rgba(124,58,237,.08);color:var(--violet)}
    .app-rank.rx{background:var(--bar-bg);color:var(--text4)}
    .app-icon{grid-row:1/4;width:34px;height:34px;border-radius:9px;background:var(--bar-bg);color:var(--text2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:850;text-align:center;overflow:hidden}
    .app-icon img{width:28px;height:28px;border-radius:8px;display:block}
    .app-name{width:auto;font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);align-self:end}
    .app-meta{grid-column:3;font-size:11.2px;color:var(--text4);text-align:left;white-space:nowrap;font-variant-numeric:tabular-nums;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;align-self:start}
    .app-track{grid-column:3;align-self:end;height:6px;background:var(--bar-bg);border-radius:999px;overflow:hidden;min-width:18px;box-shadow:none}
    html[data-theme="dark"] .app-track{background:rgba(255,255,255,.11)}
    .app-fill{position:relative;height:100%;border-radius:999px;transition:width .3s ease;min-width:3px;background:var(--primary);box-shadow:none;overflow:hidden}
    .f0,.f1,.f2,.f3,.f4,.f5,.f6,.f7,.f8,.f9{background:var(--primary)}
    .app-pct,.app-time{display:none}
    .empty{grid-column:1/-1;text-align:center;color:var(--text4);font-size:12px;padding:32px 0}
    .update-toast{
      position:fixed;right:14px;bottom:14px;z-index:24;width:min(320px,calc(100vw - 28px));
      background:var(--surface);border:1px solid var(--border-hover);border-radius:8px;
      box-shadow:var(--shadow);padding:10px 10px 10px 12px;
      display:flex;align-items:center;gap:10px;color:var(--text)
    }
    .update-toast[hidden]{display:none}
    .update-toast:not([hidden]){animation:toastIn .18s cubic-bezier(.2,.8,.2,1)}
    .update-copy{min-width:0;flex:1}
    .update-copy b{display:block;font-size:13.5px;font-weight:750;line-height:1.25}
    .update-copy span{display:block;font-size:11.5px;color:var(--text4);line-height:1.35;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .update-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .update-mini-btn{height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface-hover);color:var(--text2);font-size:12px;font-weight:650;padding:0 9px;cursor:pointer}
    .update-mini-btn.primary{background:var(--primary-dim);border-color:rgba(231,93,116,.25);color:var(--primary)}
    .update-mini-btn:hover{border-color:var(--border-hover);color:var(--text)}

    /* ── Modal ─────────────────── */
    .modal{
      position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;
      align-items:center;justify-content:center;padding:18px 14px;
      z-index:30;backdrop-filter:blur(6px)
    }
    .modal[hidden]{display:none}
    .modal:not([hidden]){animation:modalFadeIn .16s ease-out}
    .modal.closing{animation:modalFadeOut .14s ease-in forwards}
    .modal-card{
      width:100%;max-width:460px;max-height:min(78vh,520px);
      background:var(--surface);border:1px solid var(--border-hover);
      border-radius:8px;
      box-shadow:0 18px 48px rgba(0,0,0,.2);
      overflow:hidden;display:flex;flex-direction:column;
      animation:modalCardIn .18s cubic-bezier(.2,.8,.2,1);
    }
    .modal.closing .modal-card{animation:modalCardOut .14s ease-in forwards}
    .modal-card.settings-modal{max-width:430px;max-height:min(94vh,720px)}
    .modal-card.insight-modal{max-width:500px;max-height:none}
    .modal-card.analysis-modal{max-width:430px;max-height:none}
    .modal-card.update-modal{max-width:440px;max-height:none}
    .modal-card.intro-modal{max-width:430px;max-height:none}
    .modal-card.settings-modal .modal-body{overflow:hidden}
    .modal-card.insight-modal .modal-body,
    .modal-card.analysis-modal .modal-body,
    .modal-card.update-modal .modal-body,
    .modal-card.intro-modal .modal-body{overflow:hidden}
    .modal-head{height:50px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .modal-title{font-size:17px;font-weight:850;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-close{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.12);color:#ef4444}
    .modal-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .modal-body{padding:16px;overflow:auto;min-height:0;font-size:14px;-webkit-overflow-scrolling:touch}
    .modal-loading,.modal-error{font-size:14px;color:var(--text3);padding:32px;text-align:center}
    .analysis-panel{padding:10px 6px 6px;display:grid;gap:14px}
    .analysis-hero{display:flex;align-items:center;gap:13px;min-width:0}
    .analysis-orb{position:relative;width:54px;height:54px;border-radius:14px;background:var(--primary-dim);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;letter-spacing:0;flex-shrink:0;overflow:hidden}
    .analysis-orb::after{content:"";position:absolute;inset:8px;border-radius:11px;border:1px solid color-mix(in srgb,var(--primary) 36%,transparent);animation:analysisPulse 1.45s ease-in-out infinite}
    .analysis-hero b{display:block;color:var(--text);font-size:18px;font-weight:850;line-height:1.2}
    .analysis-hero span{display:block;margin-top:4px;color:var(--text3);font-size:13px;line-height:1.42}
    .analysis-steps{display:grid;gap:8px}
    .analysis-step{display:flex;align-items:center;gap:9px;background:var(--surface-hover);border-radius:8px;padding:9px 10px;color:var(--text2);font-size:13px;font-weight:650;line-height:1.25}
    .analysis-step i{width:7px;height:7px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px var(--primary-dim);flex-shrink:0}
    .analysis-step:nth-child(2) i{animation:analysisDot 1.1s ease-in-out infinite .15s}
    .analysis-step:nth-child(3) i{animation:analysisDot 1.1s ease-in-out infinite .3s}
    .analysis-bar{height:6px;background:var(--bar-bg);border-radius:999px;overflow:hidden}
    .analysis-bar span{display:block;width:42%;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),color-mix(in srgb,var(--primary) 35%,white));animation:analysisSweep 1.25s ease-in-out infinite}
    @keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes modalFadeOut{from{opacity:1}to{opacity:0}}
    @keyframes modalCardIn{from{opacity:0;transform:translateY(6px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes modalCardOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(5px) scale(.985)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes analysisPulse{0%,100%{transform:scale(.92);opacity:.5}50%{transform:scale(1.08);opacity:1}}
    @keyframes analysisDot{0%,100%{opacity:.35;transform:scale(.82)}50%{opacity:1;transform:scale(1.15)}}
    @keyframes analysisSweep{0%{transform:translateX(-110%)}50%{transform:translateX(60%)}100%{transform:translateX(240%)}}
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
    .detail-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .detail-icon{width:40px;height:40px;border-radius:10px;background:var(--bar-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .detail-icon img{width:32px;height:32px;border-radius:8px}
    .detail-name{font-size:18px;font-weight:750;color:var(--text)}
    .detail-sub{font-size:13px;color:var(--text4);margin-top:2px}
    .metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
    .metric{background:var(--surface-hover);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:0}
    .metric span{display:block;font-size:12px;color:var(--text4);margin-bottom:4px}
    .metric b{font-size:17px;color:var(--text);font-variant-numeric:tabular-nums}
    .detail-section{margin-top:14px}
    .detail-section h3{font-size:14px;color:var(--text2);font-weight:650;margin-bottom:8px}
    .detail-heat{display:grid;grid-template-columns:repeat(7,calc(11px * 4 + 2px * 3));gap:4px;justify-content:space-between}
    .detail-day-label{text-align:center;font-size:11px;color:var(--text4);margin-bottom:4px}
    .detail-day{display:grid;grid-template-columns:repeat(4,11px);grid-template-rows:repeat(6,11px);grid-auto-flow:column;gap:2px}
    .mini-cell{border-radius:2.5px;outline:1px solid rgba(0,0,0,.035);outline-offset:-1px}
    .bar-chart{height:80px;display:grid;grid-template-columns:repeat(24,1fr);align-items:end;gap:2px;padding:8px 0 0;border-bottom:1px solid var(--border)}
    .bar{min-height:3px;border-radius:3px 3px 0 0;background:var(--primary)}
    .day-bars{display:grid;grid-template-columns:repeat(7,1fr);align-items:end;gap:4px;height:80px;padding-top:8px;border-bottom:1px solid var(--border)}
    .day-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px;min-width:0}
    .day-bar{width:100%;min-height:3px;border-radius:4px 4px 0 0;background:var(--primary)}
    .day-bar-wrap span{font-size:11px;color:var(--text4)}
    .data-table{border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .data-row{display:grid;grid-template-columns:80px minmax(0,1fr);gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--border);font-size:13px;color:var(--text3)}
    .data-row:first-child{border-top:0}
    .data-row b{color:var(--text);font-weight:650;font-variant-numeric:tabular-nums}
    .data-row em{font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
    .action-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}
    .action-card{display:block;text-decoration:none;background:var(--surface-hover);border:1px solid var(--border);border-radius:10px;padding:16px;color:var(--text)}
    .action-card:hover{border-color:var(--border-hover);background:var(--primary-dim)}
    .action-card b{display:block;font-size:17px;margin-bottom:6px}
    .action-card span{font-size:14px;color:var(--text3);line-height:1.45}
    .muted{font-size:14px;color:var(--text4);line-height:1.65}
    .insight-list{display:grid;gap:8px;margin-top:7px}
    .insight-item{background:var(--surface-hover);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--text2);line-height:1.48}
    .insight-item.lead{font-size:14px;color:var(--text);background:var(--primary-dim);border-color:color-mix(in srgb,var(--primary) 22%,transparent)}
    .insight-item.clue,.insight-item.suggestion{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px;align-items:start}
    .insight-badge{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:850;font-variant-numeric:tabular-nums}
    .insight-item.clue .insight-badge{width:7px;height:7px;border-radius:50%;margin-top:7px;background:var(--primary);font-size:0;box-shadow:0 0 0 3px var(--primary-dim)}
    .insight-item.suggestion{background:linear-gradient(180deg,var(--surface),var(--surface-hover));border-color:color-mix(in srgb,var(--primary) 18%,var(--border));color:var(--text)}
    .insight-item.suggestion .insight-badge{width:22px;height:22px;border-radius:7px;background:var(--primary-dim);color:var(--primary);font-size:11px}
    .insight-section{margin-top:10px}
    .insight-section h3{font-size:13px;color:var(--text2);font-weight:700;margin:0 0 6px}
    .insight-actions{grid-template-columns:1fr;margin-top:10px}
    .insight-actions .action-card{padding:12px}
    .insight-actions .action-card b{font-size:14px;margin-bottom:3px}
    .insight-actions .action-card span{font-size:12.5px}
    .insight-foot{margin-top:10px;font-size:11.5px;color:var(--text4);line-height:1.45}
    .settings-panel{display:grid;gap:9px}
    .settings-section{background:var(--surface-hover);border:1px solid var(--border);border-radius:10px;padding:9px 10px;display:grid;gap:7px}
    .settings-section h3{font-size:12.5px;font-weight:700;color:var(--text2);margin:0}
    .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:35px}
    .setting-copy{min-width:0}
    .setting-copy b{display:block;font-size:14px;color:var(--text);font-weight:700;line-height:1.25}
    .setting-copy span{display:block;font-size:11.5px;color:var(--text4);line-height:1.35;margin-top:2px}
    .switch{width:42px;height:24px;border-radius:999px;border:1px solid var(--border-hover);background:var(--bar-bg);position:relative;cursor:pointer;flex-shrink:0;transition:background .16s ease,border-color .16s ease}
    .switch::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;left:2px;top:2px;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.18);transition:transform .16s ease}
    .switch.on{background:var(--primary);border-color:var(--primary)}
    .switch.on::after{transform:translateX(18px)}
    .settings-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .settings-action{border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:9px 10px;text-align:left;color:var(--text);cursor:pointer;min-height:48px}
    .settings-action:hover{border-color:var(--border-hover);background:var(--primary-dim)}
    .settings-action b{display:block;font-size:14px;font-weight:700;margin-bottom:4px}
    .settings-action span{display:block;font-size:12px;line-height:1.35;color:var(--text4)}
    .media-snapshot{display:grid;gap:10px}
    .media-headline{font-size:15px;font-weight:800;color:var(--text);line-height:1.35}
    .media-draft{width:100%;min-height:260px;resize:vertical;border:1px solid var(--border);border-radius:8px;background:var(--surface-hover);color:var(--text2);font:12.5px/1.55 ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',monospace;padding:10px}
    .media-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .media-copy-state{font-size:12px;color:var(--primary);min-height:18px}
    .intro-title{font-size:22px;font-weight:900;color:var(--text);line-height:1.15;margin-bottom:8px}
    .intro-copy{font-size:14px;color:var(--text2);line-height:1.68}
    .intro-points{display:grid;gap:8px;margin-top:12px}
    .intro-point{background:var(--surface-hover);border:1px solid var(--border);border-radius:8px;padding:10px 11px;font-size:13px;color:var(--text2);line-height:1.45}
    .theme-segment{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
    .theme-choice{height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-size:13px;font-weight:650}
    .theme-choice.active{border-color:color-mix(in srgb,var(--primary) 38%,transparent);background:var(--primary-dim);color:var(--primary)}
    .accent-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
    .accent-choice{height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text3);font-size:12px;font-weight:700}
    .accent-choice i{width:12px;height:12px;border-radius:50%;display:block;background:var(--swatch)}
    .accent-choice.active{border-color:color-mix(in srgb,var(--primary) 42%,transparent);background:var(--primary-dim);color:var(--primary)}

    /* ── 移动端优化 ─────────────────── */
    @media(max-width:430px){
      .wrap{--heat-cell:10px;--heat-gap:2px;--heat-day-gap:var(--heat-gap);padding:10px 10px calc(10px + var(--safe-bottom));gap:7px;grid-template-rows:38px 50px 56px minmax(142px,1fr) 418px}
      body.nativebar .wrap{grid-template-rows:50px 56px minmax(142px,1fr) 418px}
      .today-card{grid-template-columns:minmax(0,1fr) auto;gap:8px}
      .date-board{gap:5px}
      .today-score{text-align:right}
      .stats-row{grid-template-columns:1fr;height:auto}
      .stat-card{height:64px}
      .heat-card{min-height:0}
      .heat-days{grid-template-columns:repeat(var(--heat-day-count),var(--heat-day-width));gap:var(--heat-day-gap)}
      .heat-grid{grid-template-columns:repeat(var(--heat-day-count),var(--heat-day-width));gap:var(--heat-day-gap)}
      .heat-grid.year{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
      .year-month-grid{grid-template-columns:repeat(7,5px);gap:1.1px}
      .year-cell{width:5px;height:5px}
      .app-list{grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(5,64px);grid-auto-flow:column;grid-auto-rows:64px;gap:10px 8px}
      
      /* 触摸优化 */
      .app-row{padding:8px 8px 8px;min-height:64px;grid-template-columns:24px 30px minmax(0,1fr);grid-template-rows:20px 17px 8px;gap:1px 6px}
      .app-rank{width:24px;height:28px}
      .app-icon{width:30px;height:30px}
      .app-icon img{width:25px;height:25px}
      .app-name{font-size:12.5px}
      .app-meta{font-size:10.5px}
      .tool-btn, .theme-btn{width: 32px; height: 32px;}
      .settings-actions{grid-template-columns:1fr}
      .media-actions{grid-template-columns:1fr}
      .heat-head{align-items:flex-start}
      .heat-title{gap:6px}
      .modal{align-items:flex-end;padding:0}
      .modal-card{
        max-width:none;max-height:85vh;border-radius:8px 8px 0 0;
        box-shadow:0 -10px 40px rgba(0,0,0,.3);
        padding-bottom:var(--safe-bottom);
      }
    }

    /* ── 加载动画 ─────────────────── */
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--text4);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── 下拉刷新指示器 ─────────────────── */
    .pull-to-refresh {
      display: none;
      justify-content: center;
      padding: 12px;
      color: var(--text3);
      font-size: 12px;
    }
    .pull-to-refresh.active {
      display: flex;
    }

    /* ── 连接状态指示 ─────────────────── */
    .offline-indicator {
      display: none;
      background: var(--amber);
      color: #111;
      padding: 6px 12px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
    }
    .offline-indicator.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="offline-indicator" id="offline-indicator">正在连接扣舷后台…</div>
  
  <div class="wrap">
    <!-- Header -->
    <div class="header">
      <div class="title-area window-drag">
        <div class="logo" aria-hidden="true"><img src="/icon-192.png" alt=""></div>
        <div class="brand-copy"><h1>扣舷</h1><span>看见你的数字手感</span></div>
      </div>
      <button class="tool-btn" data-action="insights" onclick="openMimoInsights()" title="手感回放" aria-label="手感回放">
        <svg viewBox="0 0 24 24"><path d="M12 3l1.7 5.1L19 10l-5.3 1.9L12 17l-1.7-5.1L5 10l5.3-1.9z"/><path d="M19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8z"/></svg>
      </button>
      <button class="tool-btn" onclick="openSettings()" title="设置" aria-label="设置">
        <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>
      </button>
      <button class="window-btn" onclick="windowControl('minimize')" title="最小化" aria-label="最小化">
        <svg viewBox="0 0 24 24"><path d="M7 12h10"/></svg>
      </button>
      <button class="window-btn close" onclick="windowControl('close')" title="隐藏到托盘" aria-label="隐藏到托盘">
        <svg viewBox="0 0 24 24"><path d="M8 8l8 8M16 8l-8 8"/></svg>
      </button>
    </div>

    <!-- 下拉刷新指示器 -->
    <div class="pull-to-refresh" id="pull-to-refresh">
      <span class="loading-spinner"></span>
      <span style="margin-left: 8px">刷新中...</span>
    </div>

    <!-- Today handfeel -->
    <div class="today-card">
      <div>
        <div class="today-kicker"><span class="date-board"><button class="date-nav" id="date-prev" type="button" title="前一天" aria-label="前一天">‹</button><span id="today-date"></span><button class="date-nav" id="date-next" type="button" title="后一天" aria-label="后一天">›</button></span></div>
      </div>
      <div class="today-score"><b id="today-score">—</b></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon g"><svg viewBox="0 0 24 24"><path d="M4 7h16v10H4z"/><path d="M7 10h.01M10 10h.01M13 10h.01M16 10h.01M8 14h8"/></svg></div><div><div class="stat-label">键盘</div><div class="stat-val green" id="v-keys">—</div></div></div>
      <div class="stat-card"><div class="stat-icon m"><svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 1 6 6v6a6 6 0 0 1-12 0V9a6 6 0 0 1 6-6z"/><path d="M12 7v4"/></svg></div><div><div class="stat-label">鼠标</div><div class="stat-val amber" id="v-mouse">—</div></div></div>
      <div class="stat-card"><div class="stat-icon t"><svg viewBox="0 0 24 24"><path d="M12 7v5l3 2"/><path d="M21 12a9 9 0 1 1-9-9"/></svg></div><div><div class="stat-label">活跃时长</div><div class="stat-val teal" id="v-time">—</div></div></div>
    </div>

    <!-- Hour heatmap -->
    <div class="heat-card">
      <div class="heat-head">
        <div class="heat-title">
          <div class="dot-sm"></div>
          <h2 class="heat-label" aria-label="键盘鼠标热力图">
            <span class="heat-toggles" aria-label="热力图数据选择">
              <label class="heat-toggle"><input type="checkbox" id="heat-keyboard" checked onchange="renderHeatmap()"><span>键盘</span></label>
              <label class="heat-toggle"><input type="checkbox" id="heat-mouse" checked onchange="renderHeatmap()"><span>鼠标</span></label>
            </span><span class="heat-label-static">热力图</span>
          </h2>
          <span class="heat-now-text" id="heat-now-text"></span>
        </div>
      </div>
      <div class="heat-wrap">
        <div class="heat-days" id="heat-hours-labels"></div>

function savePreferencePatch(patch){
  return fetch('/api/settings',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(patch)
  }).then(function(r){return r.json()}).then(function(d){
    if(d&&d.ok&&d.settings){
      SETTINGS_STATE=Object.assign({},SETTINGS_DEFAULTS,d.settings||{});

  }).catch(function(){});
}
function setLanguage(lang,options){

  lang=lang==='en'?'en':'zh';
  localStorage.setItem('kx-lang',lang);
  applyLanguage();
  if(options.renderSettings!==false){
    renderSettings(SETTINGS_STATE);
  }
  savePreferencePatch({language:lang});
  loadData();
}

async function windowControl(action){
  try{
    if(!window.pywebview||!window.pywebview.api)return;
    if(action==='minimize')await window.pywebview.api.minimize();
    if(action==='close')await window.pywebview.api.close();
  }catch(e){}
}

/* ── Theme ─────────────────────── */
function getTheme(){return localStorage.getItem('kx-theme')||'light'}
function getAccent(){return localStorage.getItem('kx-accent')||'green'}
function syncNativeTheme(t){
  try{
    if(window.pywebview&&window.pywebview.api&&window.pywebview.api.set_native_theme){
      window.pywebview.api.set_native_theme(t);
    }
  }catch(e){}
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.setAttribute('data-accent',getAccent());
  var themeToggle=document.getElementById('theme-toggle');
  if(themeToggle)themeToggle.textContent=t==='dark'?'☀️':'🌙';
  document.querySelectorAll('[data-theme-choice]').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.themeChoice===t);
  });
  document.querySelectorAll('[data-accent-choice]').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.accentChoice===getAccent());
  });
  syncNativeTheme(t);
  
  // 更新 meta theme-color
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) {
    metaTheme.content = t === 'dark' ? '#151515' : '#f7f7f7';
  }
}
function setThemeChoice(t){localStorage.setItem('kx-theme',t);applyTheme(t);renderSettings(SETTINGS_STATE);savePreferencePatch({theme:t})}

function toggleTheme(){var n=getTheme()==='dark'?'light':'dark';setThemeChoice(n)}

function fmtDateShort(s){var p=String(s||'').split('-');return p.length===3?(Number(p[1])+'/'+Number(p[2])):s}
function fmtDateLabel(s){var p=String(s||'').split('-');if(p.length!==3)return s;return getLang()==='en'?(Number(p[1])+'/'+Number(p[2])):(Number(p[1])+'月'+Number(p[2])+'日')}

var modalReturnTo=null;
var modalCloseTimer=null;
function showModal(title,html,variant,options){
  options=options||{};
  if(Object.prototype.hasOwnProperty.call(options,'returnTo'))modalReturnTo=options.returnTo;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  var card=document.getElementById('modal-card');
  if(card)card.className='modal-card'+(variant?' '+variant:'');
  var modal=document.getElementById('modal');
  if(modalCloseTimer){clearTimeout(modalCloseTimer);modalCloseTimer=null}
  modal.classList.remove('closing');
  modal.hidden=false;
  document.body.style.overflow = 'hidden'; // 防止背景滚动
}
function hideModal(done){
  var modal=document.getElementById('modal');
  if(modal.hidden){
    document.body.style.overflow = '';
    if(done)done();
    return;
  }
  modal.classList.add('closing');
  if(modalCloseTimer)clearTimeout(modalCloseTimer);
  modalCloseTimer=setTimeout(function(){
    modal.hidden=true;
    modal.classList.remove('closing');
    document.body.style.overflow = '';
    modalCloseTimer=null;
    if(done)done();
  },150);
}
function closeModal(){
  var next=modalReturnTo;
  modalReturnTo=null;
  if(next==='settings'){
    hideModal(openSettings);
    return;
  }
  hideModal();
}

async function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text);
  }
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  var ok=document.execCommand('copy');
  ta.remove();
  if(!ok)throw new Error('copy failed');
}

async function loadSettingsQuietly(updateModal){
  if(settingsLoadPromise)return settingsLoadPromise;
  settingsLoadPromise=fetch('/api/settings').then(function(r){return r.json()}).then(function(d){
    if(!d.ok)throw new Error(d.error||'设置读取失败');
    SETTINGS_STATE=Object.assign({},SETTINGS_DEFAULTS,d.settings||{});
    SETTINGS_STATE.silent_start=!!(SETTINGS_STATE.silent_start||SETTINGS_STATE.background_start);
    if(d.settings&&d.settings.language&&d.settings.language!==getLang()){
      localStorage.setItem('kx-lang',d.settings.language);
      applyLanguage();
    }
    if(d.settings&&d.settings.theme&&d.settings.theme!==getTheme()){
      localStorage.setItem('kx-theme',d.settings.theme);
    }
    if(d.settings&&d.settings.accent&&d.settings.accent!==getAccent()){
      localStorage.setItem('kx-accent',d.settings.accent);
    }
    applyTheme(getTheme());
    settingsLoaded=true;
    if(updateModal&&!document.getElementById('modal').hidden&&document.getElementById('modal-title').textContent===t('settings')){
      renderSettings(SETTINGS_STATE);
    }
    return SETTINGS_STATE;
  }).finally(function(){
    settingsLoadPromise=null;
  });
  return settingsLoadPromise;
}
async function openSettings(){
  renderSettings(SETTINGS_STATE);
  try{
    await loadSettingsQuietly(true);
  }catch(e){
    if(!settingsLoaded)showModal(t('settings'),'<div class="modal-error">'+esc(e.message||t('settingsReadFailed'))+'</div>');
  }
}
async function toggleSetting(key){
  var patch={};
  patch[key]=!SETTINGS_STATE[key];
  if(key==='silent_start')patch.background_start=patch[key];
  try{
    var r=await fetch('/api/settings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(patch)
    });
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||t('settingsSaveFailed'));
    renderSettings(d.settings||{});
  }catch(e){
    showModal(t('settings'),'<div class="modal-error">'+esc(e.message||t('settingsSaveFailed'))+'</div>');
  }
}

/* ── Heatmap (previous 5 days + today) ─ */
function heatColor(v,mx){
  if(v===0)return 'var(--heat-empty)';
  var t=Math.pow(v/mx,.5);
  if(t<.16)return 'var(--heat-1)';
  if(t<.32)return 'var(--heat-2)';
  if(t<.48)return 'var(--heat-3)';
  if(t<.64)return 'var(--heat-4)';
  if(t<.82)return 'var(--heat-5)';
  return 'var(--heat-6)';
}
var WEEKDAYS_ZH=['周日','周一','周二','周三','周四','周五','周六'];
var WEEKDAYS_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var heatmapDays=[];
var heatRange='week';
var monthHeatmap=null;
var yearHeatmap=null;

function weekdayLabel(date){
  var dt=new Date(date+'T00:00:00');
  if(isNaN(dt.getTime()))return '';
  var labels=getLang()==='en'?WEEKDAYS_EN:WEEKDAYS_ZH;
  return labels[dt.getDay()]||'';
}

function selectedHeatValue(day,h){
  var includeKeyboard=document.getElementById('heat-keyboard')?.checked!==false;
  var includeMouse=document.getElementById('heat-mouse')?.checked!==false;
  var k=(day.keyboard_hourly&&day.keyboard_hourly[h])||0;
  var m=(day.mouse_hourly&&day.mouse_hourly[h])||0;
  return (includeKeyboard?k:0)+(includeMouse?m:0);
}
function selectedDayValue(day){
  var includeKeyboard=document.getElementById('heat-keyboard')?.checked!==false;
  var includeMouse=document.getElementById('heat-mouse')?.checked!==false;
  return (includeKeyboard?(day.keyboard||0):0)+(includeMouse?(day.mouse||0):0);
}
function setHeatRange(range){
  heatRange=range==='year'?'year':(range==='month'?'month':'week');
  document.getElementById('heat-week-btn')?.classList.toggle('active',heatRange==='week');
  document.getElementById('heat-month-btn')?.classList.toggle('active',heatRange==='month');
  document.getElementById('heat-year-btn')?.classList.toggle('active',heatRange==='year');
  if(heatRange==='year'&&!yearHeatmap)loadYearHeatmap();
  else if(heatRange==='month'&&!monthHeatmap)loadMonthHeatmap();
  else renderHeatmap();
}
function renderHeatmap(){
  try{
    if(heatRange==='year')return renderYearHeatmap();
    if(heatRange==='month')return renderMonthHeatmap();
    var days=heatmapDays||[];
    var mx=1;
    for(var d=0;d<days.length;d++)for(var h=0;h<24;h++){var sv=selectedHeatValue(days[d],h);if(sv>mx)mx=sv;}
    var grid=document.getElementById('heat-grid'),hourLbl=document.getElementById('heat-day-labels'),dayLbl=document.getElementById('heat-hours-labels'),weekLbl=document.getElementById('heat-weekday-labels');
    grid.classList.remove('month','year');
    var dayCount=Math.max(1,days.length||6);
    grid.style.setProperty('--heat-day-count',dayCount);
    dayLbl.style.setProperty('--heat-day-count',dayCount);
    if(weekLbl)weekLbl.style.setProperty('--heat-day-count',dayCount);
    var now=new Date(),today=todayIso(),nowHour=now.getHours();
    var nowText=document.getElementById('heat-now-text');
    if(nowText)nowText.textContent=fmtHourRange(nowHour);
    hourLbl.innerHTML='';
    dayLbl.innerHTML=days.map(function(d,i){
      var dt=new Date(d.date+'T00:00:00');
      return '<span>'+(dt.getMonth()+1)+'/'+dt.getDate()+'</span>';
    }).join('');
    if(weekLbl){
      weekLbl.innerHTML=days.map(function(d){return '<span>'+esc(weekdayLabel(d.date))+'</span>';}).join('');
    }
    var cells='';
    for(var c=0;c<days.length;c++){
      cells+='<div class="day-block">';
      for(var h=0;h<24;h++){
        var dt=new Date(days[c].date+'T00:00:00');
        var v=selectedHeatValue(days[c],h);
        var k=(days[c].keyboard_hourly&&days[c].keyboard_hourly[h])||0;
        var m=(days[c].mouse_hourly&&days[c].mouse_hourly[h])||0;
        var label=fmtHourRange(h)+' · '+t('keyboardShort')+' '+fmtNum(k)+' · '+t('mouseShort')+' '+fmtNum(m);
        var isNow=days[c].date===today&&h===nowHour;
        cells+='<div class="hc'+(isNow?' now':'')+'" style="background:'+heatColor(v,mx)+'" data-date="'+esc(days[c].date)+'" data-hour="'+h+'" data-tip="'+tipAttr(label)+'"></div>';
      }
      cells+='</div>';
    }
    grid.innerHTML=cells;
    grid.querySelectorAll('.hc[data-tip]').forEach(function(cell){
      cell.addEventListener('mouseenter',function(){
        if(nowText)nowText.textContent=cell.dataset.tip||fmtHourRange(nowHour);
      });
      cell.addEventListener('mouseleave',function(){
        if(nowText)nowText.textContent=fmtHourRange(nowHour);
      });
      cell.addEventListener('click',function(){
        openHourDetail(cell.dataset.date,Number(cell.dataset.hour||0));
      });
    });
    paintHeatLegend(mx);
  }catch(e){}
}
function renderMonthHeatmap(){
  try{
    var days=(monthHeatmap&&monthHeatmap.days)||[];
    var grid=document.getElementById('heat-grid'),dayLbl=document.getElementById('heat-hours-labels'),weekLbl=document.getElementById('heat-weekday-labels'),nowText=document.getElementById('heat-now-text');
    var mx=1;
    days.forEach(function(d){var v=selectedDayValue(d);if(v>mx)mx=v;});
    grid.classList.remove('year');
    grid.classList.add('month');
    grid.style.removeProperty('--heat-day-count');
    dayLbl.innerHTML='';
    if(weekLbl)weekLbl.innerHTML='';
    if(nowText)nowText.textContent=monthHeatmap?monthHeatmap.month:'';
    grid.innerHTML=days.map(function(d){
      var label=fmtDateLabel(d.date)+' · '+t('keyboardShort')+' '+fmtNum(d.keyboard||0)+' · '+t('mouseShort')+' '+fmtNum(d.mouse||0);
      return '<div class="month-cell" style="background:'+heatColor(selectedDayValue(d),mx)+'" data-tip="'+tipAttr(label)+'" title="'+esc(label)+'"></div>';
    }).join('');
    grid.querySelectorAll('.month-cell[data-tip]').forEach(function(cell){
      cell.addEventListener('mouseenter',function(){if(nowText)nowText.textContent=cell.dataset.tip||''});
      cell.addEventListener('mouseleave',function(){if(nowText)nowText.textContent=monthHeatmap?monthHeatmap.month:''});
    });
    paintHeatLegend(mx);
  }catch(e){}
}
function monthLabel(month){
  var p=String(month||'').split('-');
  if(p.length!==2)return month||'';
  var n=Number(p[1]);
  var names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return getLang()==='en'?(names[n-1]||String(n)):(n+'月');
}
function renderYearHeatmap(){
  try{
    var months=(yearHeatmap&&yearHeatmap.months)||[];
    var grid=document.getElementById('heat-grid'),dayLbl=document.getElementById('heat-hours-labels'),weekLbl=document.getElementById('heat-weekday-labels'),nowText=document.getElementById('heat-now-text');
    var mx=1;
    months.forEach(function(month){(month.days||[]).forEach(function(d){var v=selectedDayValue(d);if(v>mx)mx=v;})});
    grid.classList.remove('month');
    grid.classList.add('year');
    grid.style.removeProperty('--heat-day-count');
    dayLbl.innerHTML='';
    if(weekLbl)weekLbl.innerHTML='';
    if(nowText)nowText.textContent=yearHeatmap?yearHeatmap.year:'';
    grid.innerHTML=months.map(function(month){
      var cells=(month.days||[]).map(function(d){
        var label=fmtDateLabel(d.date)+' · '+t('keyboardShort')+' '+fmtNum(d.keyboard||0)+' · '+t('mouseShort')+' '+fmtNum(d.mouse||0);
        return '<div class="year-cell" style="background:'+heatColor(selectedDayValue(d),mx)+'" data-tip="'+tipAttr(label)+'" title="'+esc(label)+'"></div>';
      }).join('');
      return '<div class="year-month"><div class="year-month-grid">'+cells+'</div><div class="year-month-label">'+esc(monthLabel(month.month))+'</div></div>';
    }).join('');
    grid.querySelectorAll('.year-cell[data-tip]').forEach(function(cell){
      cell.addEventListener('mouseenter',function(){if(nowText)nowText.textContent=cell.dataset.tip||''});
      cell.addEventListener('mouseleave',function(){if(nowText)nowText.textContent=yearHeatmap?yearHeatmap.year:''});
    });
    paintHeatLegend(mx);
  }catch(e){}
}
function paintHeatLegend(mx){
  var lg=document.getElementById('heat-lg');
  if(!lg)return;
  var is=lg.querySelectorAll('i');
  for(var i=0;i<is.length;i++){
    var ratio=i===0?0:Math.pow(i/(is.length-1),1.35);
    is[i].style.background=heatColor(mx*ratio,mx);
  }
}

var lastAppsLayoutSignature='';
function renderApps(apps){
  try{
    apps=apps||[];
    if(!apps.length){document.getElementById('app-list').innerHTML='<div class="empty">'+t('noData')+'</div>';document.getElementById('app-count').textContent='';return;}
    var maxResponses=apps.reduce(function(a,b){return Math.max(a,b.responses||0)},0);
    var maxSeconds=apps.reduce(function(a,b){return Math.max(a,b.seconds||0)},0);
    var totalResponses=apps.reduce(function(a,b){return a+(b.responses||0)},0);
    var totalSeconds=apps.reduce(function(a,b){return a+(b.seconds||0)},0);
    var topApps=apps.slice(0,10);
    var signature=topApps.map(function(a){return [a.app,a.path||''].join('|')}).join('||');
    document.getElementById('app-count').textContent='';
    if(signature!==lastAppsLayoutSignature){
      lastAppsLayoutSignature=signature;
      document.getElementById('app-list').innerHTML=topApps.map(function(a,i){
        return '<div class="app-row" data-app="'+esc(encodeURIComponent(a.app))+'"><div class="app-rank '+(RANKS[i]||'rx')+'">'+(i+1)+'</div>'+iconHtml(a)+'<div class="app-name" title="'+esc(friendlyName(a.app))+'">'+esc(friendlyName(a.app))+'</div><div class="app-meta"></div><div class="app-track"><div class="app-fill '+FILLS[i%FILLS.length]+'"></div></div></div>';
      }).join('');
      document.querySelectorAll('.app-row[data-app]').forEach(function(row){
        row.addEventListener('click',function(){openAppDetail(decodeURIComponent(row.dataset.app))});
      });
    }
    var rows=document.querySelectorAll('.app-row[data-app]');
    topApps.forEach(function(a,i){
      var row=rows[i];
      if(!row)return;
      var responses=a.responses||0,seconds=a.seconds||0;
      var pct=maxResponses>0?(responses/maxResponses*100):(maxSeconds>0?(seconds/maxSeconds*100):0);
      var durationShare=totalSeconds>0?(seconds/totalSeconds*100):0;
      var fill=row.querySelector('.app-fill'),meta=row.querySelector('.app-meta');
      if(fill)fill.style.width=pct.toFixed(1)+'%';
      if(meta){
        meta.textContent=fmtTime(seconds)+' · '+durationShare.toFixed(0)+'%';
      }
    });
  }catch(e){}
}

/* ── 下拉刷新 ─────────────────── */
let touchStartY = 0;
let touchEndY = 0;
let isRefreshing = false;

document.querySelector('.wrap')?.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.querySelector('.wrap')?.addEventListener('touchmove', (e) => {
  touchEndY = e.touches[0].clientY;
  const pullDistance = touchEndY - touchStartY;
  
  // 只在页面顶部时触发下拉刷新
  if (pullDistance > 50 && window.scrollY <= 0 && !isRefreshing) {
    document.getElementById('pull-to-refresh').classList.add('active');
  }
}, { passive: true });

document.querySelector('.wrap')?.addEventListener('touchend', async () => {
  const pullDistance = touchEndY - touchStartY;
  
  if (pullDistance > 50 && window.scrollY <= 0 && !isRefreshing) {
    isRefreshing = true;
    await loadData();
    document.getElementById('pull-to-refresh').classList.remove('active');
    isRefreshing = false;
  }
  
  touchStartY = 0;
  touchEndY = 0;
}, { passive: true });

/* ── 数据加载 ─────────────────── */
async function fetchJson(url){
  var r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function loadData() {
  setOfflineMessage(false);
  updateDateControls();
  var urls=[
    '/api/day?date='+encodeURIComponent(selectedDate),
    '/api/heatmap?days=6&end='+encodeURIComponent(selectedDate),
    '/api/apps?date='+encodeURIComponent(selectedDate)
  ];
  var results=await Promise.allSettled(urls.map(fetchJson));
  var ok=false;
  if(results[0].status==='fulfilled'){
    render(results[0].value);
    ok=true;
  }
  if(results[1].status==='fulfilled'){
    heatmapDays=results[1].value.data||[];
    if(heatRange==='year'&&!yearHeatmap)loadYearHeatmap();
    else if(heatRange==='month'&&!monthHeatmap)loadMonthHeatmap();
    else renderHeatmap();
    ok=true;
  }
  if(results[2].status==='fulfilled'){
    renderApps(results[2].value.apps||[]);
    ok=true;
  }
  if(!ok){
    setOfflineMessage(true,t('connecting'));
    if(!dataRetryTimer){
      dataRetryTimer=setTimeout(function(){
        dataRetryTimer=null;
        loadData();
      },1200);
    }
  }else if(dataRetryTimer){
    clearTimeout(dataRetryTimer);
    dataRetryTimer=null;
  }
}

      if(isSelectedToday()){
        loadHeatmap();
        loadApps();
      }
    }, 15000);
    
  }catch(e){
    setOfflineMessage(true,t('connecting'));
  }
}

function introHtml(){
  return '<div class="intro-title">'+esc(t('introTitle'))+'</div>'+
    '<p class="intro-copy">'+esc(t('introBody'))+'</p>'+
    '<div class="intro-points">'+
      '<div class="intro-point">'+esc(t('intro1'))+'</div>'+
      '<div class="intro-point">'+esc(t('intro2'))+'</div>'+
      '<div class="intro-point">'+esc(t('intro3'))+'</div>'+
    '</div>'+
    '<div class="action-grid">'+
      '<a class="action-card" href="#" onclick="markIntroSeen();closeModal();return false"><b>'+esc(t('start'))+'</b><span>'+esc(t('subtitle'))+'</span></a>'+
      '<a class="action-card" href="#" onclick="toggleLang();document.getElementById(&quot;modal-title&quot;).textContent=t(&quot;introTitle&quot;);document.getElementById(&quot;modal-body&quot;).innerHTML=introHtml();return false"><b>'+esc(t('langToggle'))+'</b><span>中文 / English</span></a>'+
    '</div>';
}
function markIntroSeen(){
  var key='kx-intro-v1.8.0';
  localStorage.setItem(key,'1');
  SETTINGS_STATE.intro_seen=true;
  savePreferencePatch({intro_seen:true});
}
async function maybeShowIntro(){
  var key='kx-intro-v1.8.0';
  var hasLocalIntro=localStorage.getItem(key)==='1';
  try{
    await loadSettingsQuietly(false);
  }catch(e){}
  if(SETTINGS_STATE.intro_seen){
    if(!hasLocalIntro)localStorage.setItem(key,'1');
    return;
  }
  if(hasLocalIntro){
    SETTINGS_STATE.intro_seen=true;
    savePreferencePatch({intro_seen:true});
    return;
  }
  if(localStorage.getItem(key)==='1')return;
  localStorage.setItem(key,'1');
  SETTINGS_STATE.intro_seen=true;
  savePreferencePatch({intro_seen:true});
  showModal(t('introTitle'),introHtml(),'intro-modal',{returnTo:null});
}

// 页面可见性变化时刷新数据
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    loadData();
  }
});

init();
</script>
