<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0d1216">
  <meta name="description" content="键盘、鼠标响应和应用使用节律观察器">
  <title>交互节律</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --green-400:#4ade80;--green-500:#20b95a;--green-600:#15803d;
      --amber:#c26a12;--amber-light:#f59e0b;--sky:#0e7490;--sky-light:#22d3ee;
      --violet:#6d5bd0;--violet-light:#9b8df0;--teal:#0f8f83;
      --r:10px;--r-sm:7px;--heat-cell:15px;--heat-gap:2px;--heat-day-gap:2px;--heat-day-count:6;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    html{
      --bg:#0d1216;--surface:#121a20;--surface-hover:#18242b;--surface-raised:#1d2931;
      --border:rgba(255,255,255,.07);--border-hover:rgba(255,255,255,.13);
      --text:#e8ece9;--text2:#97a39c;--text3:#69786f;--text4:#465149;
      --primary:var(--green-500);--primary-dim:rgba(34,197,94,.12);
      --bar-bg:rgba(255,255,255,.05);
      --heat-empty:#1f272c;--heat-1:#0f3325;--heat-2:#125c37;--heat-3:#1f8b4f;--heat-4:#2fba66;--heat-5:#55d37a;--heat-6:#86efac;
      font-family:'LXGW WenKai','霞鹜文楷','LXGW WenKai Screen','Microsoft YaHei',system-ui,sans-serif;
      background:var(--bg);color:var(--text);height:100%;-webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    html[data-theme="light"]{
      --bg:#f4f6f5;--surface:#ffffff;--surface-hover:#f7faf8;--surface-raised:#ffffff;
      --border:rgba(24,35,29,.075);--border-hover:rgba(24,35,29,.14);
      --text:#18231d;--text2:#52665b;--text3:#84958d;--text4:#aebbb5;
      --primary:var(--green-600);--primary-dim:rgba(21,128,61,.085);
      --bar-bg:rgba(32,52,41,.055);
      --heat-empty:#ecefed;--heat-1:#dff6e7;--heat-2:#b8ecc8;--heat-3:#7edb9d;--heat-4:#48c774;--heat-5:#20a95a;--heat-6:#126a3b;
    }
    body{
      height:100%;overflow:hidden;display:flex;flex-direction:column;
      padding-top: var(--safe-top);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }
    
    .wrap{
      width:520px;max-width:100%;flex:1;display:flex;flex-direction:column;
      padding:12px 12px calc(12px + var(--safe-bottom));
      gap:10px;min-height:0;overflow-y:auto;overflow-x:hidden;margin:0 auto;
      -webkit-overflow-scrolling: touch;
    }
    body.nativebar .header{display:none}
    body.nativebar .wrap{padding-top:11px}

    /* ── Header ─────────────────── */
    .header{display:flex;align-items:center;gap:8px;flex-shrink:0;height:28px}
    .title-area{height:100%;display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .title-area.window-drag{cursor:grab}
    .title-area.window-drag:active{cursor:grabbing}
    .logo{width:25px;height:25px;border-radius:7px;background:linear-gradient(135deg,#126a3b,var(--green-400));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
    .header h1{font-size:15px;font-weight:700;letter-spacing:-.3px;flex-shrink:0}
    .spacer{flex:1}
    .status{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text3)}
    .dot{width:5px;height:5px;border-radius:50%;background:var(--green-500);box-shadow:0 0 6px rgba(34,197,94,.4);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .theme-btn{width:25px;height:25px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
    .theme-btn:hover{border-color:var(--border-hover);background:var(--surface-hover)}
    .tool-btn{width:25px;height:25px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .tool-btn:hover{border-color:var(--border-hover);background:var(--surface-hover);color:var(--text)}
    .tool-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .window-btn{display:none;width:25px;height:25px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;align-items:center;justify-content:center;transition:all .15s}
    body.is-desktop .window-btn{display:flex}
    .window-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .window-btn:hover{border-color:var(--border-hover);background:var(--surface-hover);color:var(--text)}
    .window-btn.close:hover{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.12);color:#ef4444}

    /* ── Stats ──────────────────── */
    .stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;flex-shrink:0;height:64px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;gap:9px;padding:0 10px;overflow:hidden}
    .stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .stat-icon.g{background:var(--primary-dim)}.stat-icon.m{background:rgba(217,119,6,.1)}.stat-icon.t{background:rgba(13,148,136,.1)}
    .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);font-weight:650;line-height:1.15}
    .stat-val{font-size:22px;font-weight:750;letter-spacing:0;line-height:1.08}
    .stat-val.green{color:var(--green-500)}.stat-val.amber{color:var(--amber)}.stat-val.teal{color:var(--teal)}

    /* ── Heatmap (contribution graph style) ── */
    .heat-card{
      background:var(--surface);border:1px solid var(--border);border-radius:9px;
      padding:12px 18px 10px;display:flex;flex-direction:column;flex-shrink:0;
      min-height: 210px;
    }
    .heat-head{display:flex;align-items:center;margin-bottom:7px;flex-shrink:0}
    .heat-title{display:flex;align-items:center;gap:7px;min-width:0;width:100%}
    .heat-title .dot-sm{width:4px;height:4px;border-radius:50%;background:var(--green-500)}
    .heat-label{display:flex;align-items:baseline;gap:0;font-size:13.5px;font-weight:680;color:var(--text2);white-space:nowrap;line-height:1}
    .heat-label-static{color:var(--text2)}
    .heat-now-text{font-size:12px;color:var(--text4);font-variant-numeric:tabular-nums;margin-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1}
    .heat-toggles{display:contents}
    .heat-toggle{display:inline-flex;align-items:baseline;color:var(--text4);font:inherit;cursor:pointer;user-select:none;line-height:1}
    .heat-toggle input{position:absolute;opacity:0;pointer-events:none}
    .heat-toggle span{transition:color .12s ease,opacity .12s ease}
    .heat-toggle:hover span{color:var(--text2)}
    .heat-toggle input:checked + span{color:var(--primary)}
    .heat-range{display:none}
    .heat-wrap{flex:1;display:flex;flex-direction:column;align-items:center;min-height:0;justify-content:center;width:100%;overflow:auto}
    .heat-days{display:grid;grid-template-columns:repeat(var(--heat-day-count),calc(var(--heat-cell) * 4 + var(--heat-gap) * 3));justify-content:center;width:max-content;margin-bottom:7px;flex-shrink:0;gap:var(--heat-day-gap)}
    .heat-days span{font-size:11px;color:var(--text4);text-align:center;white-space:nowrap;font-variant-numeric:tabular-nums}
    .heat-body{display:flex;justify-content:center;align-items:center;width:100%;min-height:0}
    .heat-hours{display:none}
    .heat-grid{display:grid;grid-template-columns:repeat(var(--heat-day-count),calc(var(--heat-cell) * 4 + var(--heat-gap) * 3));gap:var(--heat-day-gap);justify-content:center;width:max-content;min-width:0;min-height:0}
    .day-block{display:grid;grid-template-columns:repeat(4,var(--heat-cell));grid-template-rows:repeat(6,var(--heat-cell));grid-auto-flow:column;gap:var(--heat-gap)}
    .hc{position:relative;border-radius:3px;cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;min-width:0;min-height:0;outline:1px solid rgba(255,255,255,.045);outline-offset:-1px}
    html[data-theme="light"] .hc{outline-color:rgba(24,35,29,.045)}
    .hc.now{box-shadow:0 0 0 2px rgba(74,222,128,.72);z-index:1}
    html[data-theme="light"] .hc.now{box-shadow:0 0 0 2px rgba(21,128,61,.5)}
    .hc:hover{transform:scale(1.18);z-index:2;box-shadow:0 0 6px rgba(0,0,0,.18)}
    .heat-foot{display:flex;align-items:center;gap:6px;margin-top:9px;justify-content:center;flex-shrink:0}
    .heat-foot .heat-legend{display:flex;align-items:center;gap:4px}
    .heat-foot span{font-size:10px;color:var(--text4)}
    .heat-foot .lg-cells{display:flex;gap:2px}
    .heat-foot .lg-cells i{width:10px;height:10px;border-radius:2px;display:inline-block;outline:1px solid rgba(0,0,0,.035);outline-offset:-1px}

    /* ── App usage ──────────────── */
    .app-section{
      display:flex;flex-direction:column;min-height:0;background:var(--surface);
      border:1px solid var(--border);border-radius:9px;padding:14px 14px 13px;
      overflow:hidden;flex-shrink:0;
      max-height: 300px;
    }
    .sec-head{display:flex;align-items:center;gap:7px;margin-bottom:10px}
    .sec-head .dot-sm{width:4px;height:4px;border-radius:50%;flex-shrink:0}
    .sec-head h2{font-size:13.5px;font-weight:680;color:var(--text2)}
    .app-list{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:repeat(5,29px);grid-auto-flow:column;grid-auto-rows:29px;column-gap:10px;row-gap:4px;min-height:0}
    .app-row{display:flex;align-items:center;gap:5px;padding:2px 4px;border-radius:6px;transition:background .12s;flex-shrink:0;min-width:0;cursor:pointer}
    .app-row:hover{background:var(--bar-bg)}
    .app-row:active{background:var(--primary-dim)}
    .app-rank{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
    .app-rank.r0{background:var(--primary-dim);color:var(--green-500)}
    .app-rank.r1{background:rgba(13,148,136,.1);color:var(--teal)}
    .app-rank.r2{background:rgba(217,119,6,.08);color:var(--amber)}
    .app-rank.r3{background:rgba(124,58,237,.08);color:var(--violet)}
    .app-rank.rx{background:var(--bar-bg);color:var(--text4)}
    .app-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;text-align:center}
    .app-icon img{width:19px;height:19px;border-radius:5px;display:block}
    .app-name{width:70px;font-size:12.5px;font-weight:560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;color:var(--text)}
    .app-track{flex:1;height:11px;background:var(--bar-bg);border-radius:4px;overflow:hidden;min-width:18px}
    .app-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.25,.8,.25,1);min-width:2px}
    .f0{background:linear-gradient(90deg,var(--green-600),var(--green-400))}
    .f1{background:linear-gradient(90deg,var(--teal),var(--green-400))}
    .f2{background:linear-gradient(90deg,var(--amber),var(--amber-light))}
    .f3{background:linear-gradient(90deg,var(--violet),var(--violet-light))}
    .f4{background:linear-gradient(90deg,var(--sky),var(--sky-light))}
    .f5{background:linear-gradient(90deg,var(--green-400),#86efac)}
    .app-pct{width:24px;font-size:10.5px;color:var(--text4);text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
    .app-time{width:36px;font-size:11.5px;color:var(--text3);text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0}
    .empty{text-align:center;color:var(--text4);font-size:12px;padding:32px 0}
    .update-toast{
      position:fixed;right:14px;bottom:14px;z-index:24;width:min(320px,calc(100vw - 28px));
      background:var(--surface);border:1px solid var(--border-hover);border-radius:12px;
      box-shadow:0 14px 36px rgba(0,0,0,.22);padding:10px 10px 10px 12px;
      display:flex;align-items:center;gap:10px;color:var(--text)
    }
    .update-toast[hidden]{display:none}
    .update-copy{min-width:0;flex:1}
    .update-copy b{display:block;font-size:13.5px;font-weight:750;line-height:1.25}
    .update-copy span{display:block;font-size:11.5px;color:var(--text4);line-height:1.35;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .update-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .update-mini-btn{height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface-hover);color:var(--text2);font-size:12px;font-weight:650;padding:0 9px;cursor:pointer}
    .update-mini-btn.primary{background:var(--primary-dim);border-color:rgba(22,163,74,.25);color:var(--primary)}
    .update-mini-btn:hover{border-color:var(--border-hover);color:var(--text)}

    /* ── Modal ─────────────────── */
    .modal{
      position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;
      align-items:center;justify-content:center;padding:18px 14px;
      z-index:30;backdrop-filter:blur(6px)
    }
    .modal[hidden]{display:none}
    .modal-card{
      width:100%;max-width:460px;max-height:min(78vh,520px);
      background:var(--surface);border:1px solid var(--border-hover);
      border-radius:12px;
      box-shadow:0 18px 48px rgba(0,0,0,.28);
      overflow:hidden;display:flex;flex-direction:column;
    }
    .modal-card.settings-modal{max-width:430px;max-height:none}
    .modal-card.insight-modal{max-width:500px;max-height:none}
    .modal-card.update-modal{max-width:440px;max-height:none}
    .modal-card.settings-modal .modal-body,
    .modal-card.insight-modal .modal-body,
    .modal-card.update-modal .modal-body{overflow:hidden}
    .modal-head{height:48px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
    .modal-title{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .modal-close{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-close:hover{border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.12);color:#ef4444}
    .modal-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .modal-body{padding:16px;overflow:auto;min-height:0;font-size:14px;-webkit-overflow-scrolling:touch}
    .modal-loading,.modal-error{font-size:14px;color:var(--text3);padding:32px;text-align:center}
    .detail-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .detail-icon{width:40px;height:40px;border-radius:10px;background:var(--bar-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .detail-icon img{width:32px;height:32px;border-radius:8px}
    .detail-name{font-size:18px;font-weight:750;color:var(--text)}
    .detail-sub{font-size:13px;color:var(--text4);margin-top:2px}
    .metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px}
    .metric{background:var(--surface-hover);border:1px solid var(--border);border-radius:10px;padding:10px;min-width:0}
    .metric span{display:block;font-size:12px;color:var(--text4);margin-bottom:4px}
    .metric b{font-size:17px;color:var(--text);font-variant-numeric:tabular-nums}
    .detail-section{margin-top:14px}
    .detail-section h3{font-size:14px;color:var(--text2);font-weight:650;margin-bottom:8px}
    .detail-heat{display:grid;grid-template-columns:repeat(7,calc(11px * 4 + 2px * 3));gap:4px;justify-content:space-between}
    .detail-day-label{text-align:center;font-size:11px;color:var(--text4);margin-bottom:4px}
    .detail-day{display:grid;grid-template-columns:repeat(4,11px);grid-template-rows:repeat(6,11px);grid-auto-flow:column;gap:2px}
    .mini-cell{border-radius:2.5px;outline:1px solid rgba(0,0,0,.035);outline-offset:-1px}
    .bar-chart{height:80px;display:grid;grid-template-columns:repeat(24,1fr);align-items:end;gap:2px;padding:8px 0 0;border-bottom:1px solid var(--border)}
    .bar{min-height:3px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#7dd3fc,#0e7490)}
    .day-bars{display:grid;grid-template-columns:repeat(7,1fr);align-items:end;gap:4px;height:80px;padding-top:8px;border-bottom:1px solid var(--border)}
    .day-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:4px;min-width:0}
    .day-bar{width:100%;min-height:3px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#86efac,#16a34a)}
    .day-bar-wrap span{font-size:11px;color:var(--text4)}
    .data-table{border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .data-row{display:grid;grid-template-columns:80px minmax(0,1fr);gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--border);font-size:13px;color:var(--text3)}
    .data-row:first-child{border-top:0}
    .data-row b{color:var(--text);font-weight:650;font-variant-numeric:tabular-nums}
    .data-row em{font-style:normal;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
    .action-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}
    .action-card{display:block;text-decoration:none;background:var(--surface-hover);border:1px solid var(--border);border-radius:10px;padding:16px;color:var(--text)}
    .action-card:hover{border-color:var(--border-hover);background:var(--primary-dim)}
    .action-card b{display:block;font-size:17px;margin-bottom:6px}
    .action-card span{font-size:14px;color:var(--text3);line-height:1.45}
    .muted{font-size:14px;color:var(--text4);line-height:1.65}
    .insight-list{display:grid;gap:7px;margin-top:7px}
    .insight-item{background:var(--surface-hover);border:1px solid var(--border);border-radius:9px;padding:9px 10px;font-size:13px;color:var(--text2);line-height:1.48}
    .insight-item.lead{font-size:14px;color:var(--text);background:var(--primary-dim);border-color:rgba(22,163,74,.18)}
    .insight-section{margin-top:10px}
    .insight-section h3{font-size:13px;color:var(--text2);font-weight:700;margin:0 0 6px}
    .insight-foot{margin-top:10px;font-size:11.5px;color:var(--text4);line-height:1.45}
    .settings-panel{display:grid;gap:9px}
    .settings-section{background:var(--surface-hover);border:1px solid var(--border);border-radius:10px;padding:10px;display:grid;gap:8px}
    .settings-section h3{font-size:12.5px;font-weight:700;color:var(--text2);margin:0}
    .setting-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:38px}
    .setting-copy{min-width:0}
    .setting-copy b{display:block;font-size:14px;color:var(--text);font-weight:700;line-height:1.25}
    .setting-copy span{display:block;font-size:11.5px;color:var(--text4);line-height:1.35;margin-top:2px}
    .switch{width:42px;height:24px;border-radius:999px;border:1px solid var(--border-hover);background:var(--bar-bg);position:relative;cursor:pointer;flex-shrink:0;transition:background .16s ease,border-color .16s ease}
    .switch::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;left:2px;top:2px;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.18);transition:transform .16s ease}
    .switch.on{background:var(--primary);border-color:var(--primary)}
    .switch.on::after{transform:translateX(18px)}
    .settings-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .settings-action{border:1px solid var(--border);background:var(--surface);border-radius:9px;padding:9px 10px;text-align:left;color:var(--text);cursor:pointer;min-height:48px}
    .settings-action:hover{border-color:var(--border-hover);background:var(--primary-dim)}
    .settings-action b{display:block;font-size:14px;font-weight:700;margin-bottom:4px}
    .settings-action span{display:block;font-size:12px;line-height:1.35;color:var(--text4)}
    .theme-segment{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}

  try{

  try{
    if(window.pywebview&&window.pywebview.api&&window.pywebview.api.set_native_theme){
      window.pywebview.api.set_native_theme(t);
    }
  }catch(e){}
}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  var themeToggle=document.getElementById('theme-toggle');
  if(themeToggle)themeToggle.textContent=t==='dark'?'☀️':'🌙';
  document.querySelectorAll('[data-theme-choice]').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.themeChoice===t);
  });
  syncNativeTheme(t);
  
  // 更新 meta theme-color
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) {
    metaTheme.content = t === 'dark' ? '#0d1216' : '#f4f6f5';
  }
}

function friendlyName(a){
  if(APP_MAP[a])return APP_MAP[a];

/* ── Modal ─────────────────────── */
var modalReturnTo=null;
function showModal(title,html,variant,options){
  options=options||{};
  if(Object.prototype.hasOwnProperty.call(options,'returnTo'))modalReturnTo=options.returnTo;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  var card=document.getElementById('modal-card');
  if(card)card.className='modal-card'+(variant?' '+variant:'');
  document.getElementById('modal').hidden=false;
  document.body.style.overflow = 'hidden'; // 防止背景滚动
}
function closeModal(){
  var next=modalReturnTo;
  modalReturnTo=null;
  if(next==='settings'){
    openSettings();
    return;
  }
  document.getElementById('modal').hidden=true;
  document.body.style.overflow = '';
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')closeModal()});
window.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

// 移动端：点击 modal 外部关闭
document.getElementById('modal')?.addEventListener('touchend', function(e) {
  if (e.target.id === 'modal') {
    closeModal();
  }
});

function renderHourBars(values){
  var mx=Math.max(1,...values);
  return '<div class="bar-chart">'+values.map(function(v,h){
    var height=v>0?Math.max(6,(v/mx)*100):2;
    return '<div class="bar" title="'+fmtHour(h)+' · '+fmtTime(v)+'" style="height:'+height.toFixed(1)+'%"></div>';
  }).join('')+'</div>';
}
function renderDayBars(days){
  var mx=Math.max(1,...days.map(function(d){return d.seconds||d.responses||0}));
  return '<div class="day-bars">'+days.map(function(d){
    var v=d.seconds||d.responses||0,height=v>0?Math.max(6,(v/mx)*100):2;
    return '<div class="day-bar-wrap" title="'+esc(d.date)+' · '+(d.seconds!=null?fmtTime(v):fmtNum(v)+' 次')+'"><div class="day-bar" style="height:'+height.toFixed(1)+'%"></div><span>'+fmtDateShort(d.date)+'</span></div>';
  }).join('')+'</div>';
}
function renderDetailHeat(days){
  var mx=1;
  days.forEach(function(day){(day.hourly||[]).forEach(function(v){if(v>mx)mx=v})});
  return '<div class="detail-heat">'+days.map(function(day){
    return '<div><div class="detail-day-label">'+fmtDateShort(day.date)+'</div><div class="detail-day">'+(day.hourly||[]).map(function(v,h){
      return '<div class="mini-cell" title="'+fmtDateShort(day.date)+' '+fmtHour(h)+' · '+fmtTime(v)+'" style="background:'+heatColor(v,mx)+'"></div>';
    }).join('')+'</div></div>';
  }).join('')+'</div>';
}
async function downloadExport(format){
  var r=await fetch('/api/export?format='+format+'&days=30');
  var blob=await r.blob();
  var cd=r.headers.get('Content-Disposition')||'';
  var m=/filename="([^"]+)"/.exec(cd);
  var name=m?m[1]:'interaction-rhythm-30d.'+format;
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(url)},500);
}

  showModal('导出数据',

    '<div class="action-grid">'+
      '<a class="action-card" href="#" onclick="downloadExport(&quot;json&quot;);return false"><b>JSON</b><span>保留完整记录结构，适合后续分析。</span></a>'+
      '<a class="action-card" href="#" onclick="downloadExport(&quot;csv&quot;);return false"><b>CSV</b><span>普通表格文件，打开后就能筛选和排序。</span></a>'+
    '</div>'

}
var SETTINGS_STATE={auto_start:false,background_start:false,silent_start:false,auto_update_check:true};
function settingsToggle(key){
  var on=!!SETTINGS_STATE[key];
  return '<button class="switch '+(on?'on':'')+'" onclick="toggleSetting(&quot;'+key+'&quot;)" aria-label="'+(on?'关闭':'开启')+'"></button>';
}
function renderSettings(settings){
  SETTINGS_STATE=Object.assign({auto_start:false,background_start:false,silent_start:false,auto_update_check:true},settings||{});
  SETTINGS_STATE.silent_start=!!(SETTINGS_STATE.silent_start||SETTINGS_STATE.background_start);
  showModal('设置',

        '<div class="setting-row"><div class="setting-copy"><b>静默启动</b><span>自启时只进托盘，不弹主窗口。</span></div>'+settingsToggle('silent_start')+'</div>'+
      '</div>'+
      '<div class="settings-section">'+
        '<h3>数据与版本</h3>'+
        '<div class="setting-row"><div class="setting-copy"><b>自动检查更新</b><span>启动后轻量检查，有新版时提醒。</span></div>'+settingsToggle('auto_update_check')+'</div>'+
        '<div class="settings-actions">'+
          '<button class="settings-action" onclick="openExport()"><b>导出数据</b><span>最近 30 天记录。</span></button>'+
          '<button class="settings-action" onclick="openUpdate()"><b>检查更新</b><span>发现新版后安装。</span></button>'+
        '</div>'+
      '</div>'+
      '<div class="settings-section">'+
        '<h3>外观</h3>'+

          '<button class="theme-choice '+(getTheme()==='dark'?'active':'')+'" data-theme-choice="dark" onclick="setThemeChoice(&quot;dark&quot;)">深色</button>'+

async function openSettings(){
  showModal('设置','<div class="modal-loading">正在读取设置…</div>');
  try{
    var r=await fetch('/api/settings');
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'设置读取失败');

  }catch(e){
    showModal('设置','<div class="modal-error">'+esc(e.message||'设置读取失败')+'</div>');
  }
}
async function toggleSetting(key){
  var patch={};
  patch[key]=!SETTINGS_STATE[key];
  if(key==='silent_start')patch.background_start=patch[key];
  try{
    var r=await fetch('/api/settings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(patch)
    });
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'设置保存失败');
    renderSettings(d.settings||{});
  }catch(e){
    showModal('设置','<div class="modal-error">'+esc(e.message||'设置保存失败')+'</div>');
  }
}
var lastUpdateManifest=null;
var startupUpdateChecked=false;
function renderUpdateNotes(notes){
  if(!notes||!notes.length)return '<p class="muted">这次更新没有额外说明。</p>';
  return '<div class="insight-list">'+notes.map(function(x){
    return '<div class="insight-item">'+esc(x)+'</div>';
  }).join('')+'</div>';
}
function showUpdateToast(m){
  lastUpdateManifest=m;
  var title=document.getElementById('update-toast-title');
  var sub=document.getElementById('update-toast-sub');
  if(title)title.textContent='发现新版本 '+(m.latest||'');
  if(sub)sub.textContent=(m.notes&&m.notes[0])?m.notes[0]:'可以稍后安装';
  document.getElementById('update-toast').hidden=false;
}
function dismissUpdateToast(){
  document.getElementById('update-toast').hidden=true;
}
function showUpdateAvailable(m,returnTo){
  lastUpdateManifest=m;
  var size=m.size?(' · '+(m.size/1024/1024).toFixed(1)+' MB'):'';
  showModal('发现新版本',
    '<div class="metric-grid">'+
      '<div class="metric"><span>当前版本</span><b>'+esc(m.current||'—')+'</b></div>'+
      '<div class="metric"><span>新版本</span><b>'+esc(m.latest||'—')+'</b></div>'+
    '</div>'+
    '<p class="muted">新版已准备好。安装时应用会短暂关闭，完成后自动重新打开。'+esc(size)+'</p>'+
    '<div class="detail-section"><h3>更新内容</h3>'+renderUpdateNotes(m.notes||[])+'</div>'+
    '<div class="action-grid">'+
      '<a class="action-card" href="#" onclick="installUpdate();return false"><b>下载并安装</b><span>安装过程中应用会短暂关闭。</span></a>'+
      '<a class="action-card" href="#" onclick="closeModal();return false"><b>稍后再说</b><span>保留当前版本继续使用。</span></a>'+
    '</div>',
    'update-modal',
    {returnTo:returnTo}
  );
}
function openPendingUpdate(){
  dismissUpdateToast();
  if(lastUpdateManifest&&lastUpdateManifest.has_update){
    showUpdateAvailable(lastUpdateManifest,null);
  }else{
    openUpdate();
  }
}
async function openUpdate(){
  showModal('检查更新','<div class="modal-loading">正在检查新版本…</div>','update-modal',{returnTo:'settings'});
  try{
    var r=await fetch('/api/update/check');
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'更新检查失败');
    var m=d.manifest||{};
    lastUpdateManifest=m;
    if(!m.has_update){
      var noUpdateText=m.update_configured===false
        ? '当前测试版还没有配置更新通道。把 update.json 和交互节律.zip 放到稳定地址后，这里会自动检查新版本。'
        : '现在已经是最新版本。';
      showModal('检查更新',
        '<div class="metric-grid">'+
          '<div class="metric"><span>当前版本</span><b>'+esc(m.current||'—')+'</b></div>'+
          '<div class="metric"><span>最新版本</span><b>'+esc(m.latest||'—')+'</b></div>'+
        '</div>'+
        '<p class="muted">'+esc(noUpdateText)+'</p>',
        'update-modal'
      );
      return;
    }
    showUpdateAvailable(m,'settings');
  }catch(e){
    showModal('检查更新','<div class="modal-error">'+esc(e.message||'更新检查失败')+'</div>','update-modal');
  }
}
async function checkUpdateSilently(){
  if(startupUpdateChecked)return;
  startupUpdateChecked=true;
  try{
    var settingsResp=await fetch('/api/settings');
    var settingsData=await settingsResp.json();
    if(settingsData.ok&&settingsData.settings&&settingsData.settings.auto_update_check===false)return;
    var r=await fetch('/api/update/check');
    var d=await r.json();
    var m=d.manifest||{};
    if(d.ok&&m.has_update)showUpdateToast(m);
  }catch(e){}
}
async function installUpdate(){
  if(!lastUpdateManifest)return;
  showModal('安装更新','<div class="modal-loading">正在准备下载和安装，应用稍后会自动关闭…</div>','update-modal',{returnTo:null});
  try{
    var r=await fetch('/api/update/install',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({manifest:lastUpdateManifest})
    });
    var d=await r.json();
    if(!d.ok)throw new Error(d.error||'更新安装失败');
    showModal('安装更新','<div class="modal-loading">'+esc(d.message||'正在安装更新，应用稍后会自动重启')+'</div>','update-modal',{returnTo:null});
  }catch(e){
    showModal('安装更新','<div class="modal-error">'+esc(e.message||'更新安装失败')+'</div>','update-modal',{returnTo:null});
  }
}

function renderInsights(d){

/* ── Render stats ──────────────── */
function render(d){
  document.getElementById('v-keys').textContent=fmtNum(d.keystrokes);
  document.getElementById('v-mouse').textContent=fmtNum(d.mouse_events||0);
  document.getElementById('v-time').textContent=fmtTime(d.total_seconds||0);
}

/* ── Heatmap (previous 5 days + today) ─ */
function heatColor(v,mx){
  if(v===0)return 'var(--heat-empty)';
  var t=Math.pow(v/mx,.5);
  if(t<.16)return 'var(--heat-1)';
  if(t<.32)return 'var(--heat-2)';
  if(t<.48)return 'var(--heat-3)';
  if(t<.64)return 'var(--heat-4)';
  if(t<.82)return 'var(--heat-5)';
  return 'var(--heat-6)';
}
var WEEKDAYS=['周日','周一','周二','周三','周四','周五','周六'];
var heatmapDays=[];

function selectedHeatValue(day,h){
  var includeKeyboard=document.getElementById('heat-keyboard')?.checked!==false;
  var includeMouse=document.getElementById('heat-mouse')?.checked!==false;
  var k=(day.keyboard_hourly&&day.keyboard_hourly[h])||0;
  var m=(day.mouse_hourly&&day.mouse_hourly[h])||0;
  return (includeKeyboard?k:0)+(includeMouse?m:0);
}
function renderHeatmap(){
  try{
    var days=heatmapDays||[];
    var mx=1;
    for(var d=0;d<days.length;d++)for(var h=0;h<24;h++){var sv=selectedHeatValue(days[d],h);if(sv>mx)mx=sv;}
    var grid=document.getElementById('heat-grid'),hourLbl=document.getElementById('heat-day-labels'),dayLbl=document.getElementById('heat-hours-labels');
    var dayCount=Math.max(1,days.length||6);
    grid.style.setProperty('--heat-day-count',dayCount);
    dayLbl.style.setProperty('--heat-day-count',dayCount);
    var now=new Date(),today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),nowHour=now.getHours();
    var nowText=document.getElementById('heat-now-text');
    if(nowText)nowText.textContent=fmtHourRange(nowHour);
    hourLbl.innerHTML='';
    dayLbl.innerHTML=days.map(function(d,i){
      var dt=new Date(d.date+'T00:00:00');
      return '<span>'+(dt.getMonth()+1)+'/'+dt.getDate()+'</span>';
    }).join('');
    var cells='';
    for(var c=0;c<days.length;c++){
      cells+='<div class="day-block">';
      for(var h=0;h<24;h++){
        var dt=new Date(days[c].date+'T00:00:00');
        var v=selectedHeatValue(days[c],h);
        var k=(days[c].keyboard_hourly&&days[c].keyboard_hourly[h])||0;
        var m=(days[c].mouse_hourly&&days[c].mouse_hourly[h])||0;
        var label=fmtHourRange(h)+' · 键盘 '+fmtNum(k)+' · 鼠标 '+fmtNum(m);
        var isNow=days[c].date===today&&h===nowHour;
        cells+='<div class="hc'+(isNow?' now':'')+'" style="background:'+heatColor(v,mx)+'" data-tip="'+tipAttr(label)+'"></div>';
      }
      cells+='</div>';
    }
    grid.innerHTML=cells;
    grid.querySelectorAll('.hc[data-tip]').forEach(function(cell){
      cell.addEventListener('mouseenter',function(){
        if(nowText)nowText.textContent=cell.dataset.tip||fmtHourRange(nowHour);
      });
      cell.addEventListener('mouseleave',function(){
        if(nowText)nowText.textContent=fmtHourRange(nowHour);
      });
    });
    // Legend color cells
    var lg=document.getElementById('heat-lg');
    if(lg){var is=lg.querySelectorAll('i');for(var i=0;i<is.length;i++){is[i].style.background=heatColor(i===0?0:(mx*(i+1)/5),mx);}}
  }catch(e){}
}
async function loadHeatmap(){
  try{
    var r=await fetch('/api/heatmap?days=6'),j=await r.json();
    heatmapDays=j.data||[];
    renderHeatmap();
  }catch(e){}
}

/* ── App bars ──────────────────── */
var lastAppsLayoutSignature='';
function renderApps(apps){
  try{
    apps=apps||[];
    if(!apps.length){document.getElementById('app-list').innerHTML='<div class="empty">暂无数据</div>';document.getElementById('app-count').textContent='';return;}
    var mx=apps[0].seconds,total=apps.reduce(function(a,b){return a+b.seconds},0);
    var topApps=apps.slice(0,10);
    var signature=topApps.map(function(a){return [a.app,a.path||''].join('|')}).join('||');
    document.getElementById('app-count').textContent='';
    if(signature!==lastAppsLayoutSignature){
      lastAppsLayoutSignature=signature;
      document.getElementById('app-list').innerHTML=topApps.map(function(a,i){
        return '<div class="app-row" data-app="'+esc(encodeURIComponent(a.app))+'"><div class="app-rank '+(RANKS[i]||'rx')+'">'+(i+1)+'</div>'+iconHtml(a)+'<div class="app-name" title="'+esc(friendlyName(a.app))+'">'+esc(friendlyName(a.app))+'</div><div class="app-track"><div class="app-fill '+FILLS[i%FILLS.length]+'"></div></div><div class="app-pct"></div><div class="app-time"></div></div>';
      }).join('');
      document.querySelectorAll('.app-row[data-app]').forEach(function(row){
        row.addEventListener('click',function(){openAppDetail(decodeURIComponent(row.dataset.app))});
      });
    }
    var rows=document.querySelectorAll('.app-row[data-app]');
    topApps.forEach(function(a,i){
      var row=rows[i];
      if(!row)return;
      var pct=mx>0?(a.seconds/mx*100):0,share=total>0?(a.seconds/total*100):0;
      var fill=row.querySelector('.app-fill'),pctEl=row.querySelector('.app-pct'),timeEl=row.querySelector('.app-time');
      if(fill)fill.style.width=pct.toFixed(1)+'%';
      if(pctEl)pctEl.textContent=share.toFixed(0)+'%';
      if(timeEl)timeEl.textContent=fmtTime(a.seconds);
    });
  }catch(e){}
}
async function loadApps(){
  try{
    var r=await fetch('/api/apps'),j=await r.json();
    renderApps(j.apps||[]);
  }catch(e){}
}

/* ── 下拉刷新 ─────────────────── */
let touchStartY = 0;
let touchEndY = 0;
let isRefreshing = false;

document.querySelector('.wrap')?.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.querySelector('.wrap')?.addEventListener('touchmove', (e) => {
  touchEndY = e.touches[0].clientY;
  const pullDistance = touchEndY - touchStartY;
  
  // 只在页面顶部时触发下拉刷新
  if (pullDistance > 50 && window.scrollY <= 0 && !isRefreshing) {
    document.getElementById('pull-to-refresh').classList.add('active');
  }
}, { passive: true });

document.querySelector('.wrap')?.addEventListener('touchend', async () => {
  const pullDistance = touchEndY - touchStartY;
  
  if (pullDistance > 50 && window.scrollY <= 0 && !isRefreshing) {
    isRefreshing = true;
    await loadData();
    document.getElementById('pull-to-refresh').classList.remove('active');
    isRefreshing = false;
  }
  
  touchStartY = 0;
  touchEndY = 0;
}, { passive: true });

/* ── 数据加载 ─────────────────── */
async function loadData() {
  try {
    setOfflineMessage(false);
    var todayReq = fetch('/api/today').then(function(r){return r.json()});
    var heatReq = fetch('/api/heatmap?days=6').then(function(r){return r.json()});
    var appsReq = fetch('/api/apps').then(function(r){return r.json()});
    var results = await Promise.all([todayReq, heatReq, appsReq]);
    render(results[0]);
    heatmapDays = results[1].data || [];
    renderHeatmap();
    var appList = results[2].apps || [];
    renderApps(appList);
  } catch(e) {
    console.error('数据加载失败:', e);
    setOfflineMessage(true,'正在连接交互节律后台…');
    if(!dataRetryTimer){
      dataRetryTimer=setTimeout(function(){
        dataRetryTimer=null;
        loadData();
      },1200);
    }
  }
}

/* ── Init ──────────────────────── */
async function init(){
  try{
    await loadData();
    setTimeout(checkUpdateSilently, 2500);

    // 定时刷新（降低频率以节省电量）
    setInterval(async function(){
      if(document.hidden)return;
      try{
        var r=await fetch('/api/today');
        render(await r.json());
      }catch(e){}
    }, 3500);
    
    setInterval(function(){
      if(document.hidden)return;
      loadHeatmap();
      loadApps();
    }, 15000);
    
  }catch(e){
    setOfflineMessage(true,'正在连接交互节律后台…');
  }
}

// 页面可见性变化时刷新数据
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    loadData();
  }
});

init();
</script>
